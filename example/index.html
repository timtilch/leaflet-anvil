<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Anvil Example</title>
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: "Avenir Next", "Segoe UI", sans-serif;
        }

        .example-hint {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 1000;
            max-width: 300px;
            padding: 12px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
            color: #0f172a;
            line-height: 1.45;
            backdrop-filter: blur(10px);
        }

        .example-hint__eyebrow {
            margin-bottom: 4px;
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .example-hint__title {
            margin-bottom: 6px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
        }

        .example-hint__body {
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }

        .example-hint__tip {
            color: #475569;
            font-size: 13px;
        }

        .custom-marker-shell {
            background: transparent;
            border: 0;
        }

        .custom-marker-dot {
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-radius: 999px;
            background: #2563eb;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
            box-sizing: border-box;
        }

        .custom-marker-dot--draw {
            background: #0f766e;
            box-shadow: 0 6px 18px rgba(15, 118, 110, 0.35);
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="hint" class="example-hint"></div>
<script type="module" src="./main.ts"></script>
</body>
</html>
